<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSA Knowledge Graph</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
    <script src="script.js" defer></script>
  </head>

  <body>
    <nav class="navbar">
      <a href="index.html">Home</a>
      <a href="navbar/dsa/dsa.html">DSA</a>
      <a href="navbar/practice/practice.html">Practice Problem</a>
      <a href="navbar/quiz-index.html">Quizzes</a>
      <a href="navbar/interview/interview.html">Interview</a>
    </nav>
    <main class="mainlayout">
      <section class="cygraph">
        <div id="cy"></div>
      </section>

      <section class="result">
        <div id="searchForm" class="searchbar">
          <input
            id="searchInput"
            type="text"
            placeholder="Search for something... ex: what is graph?"
          />
          <button id="searchButton" type="button">Search</button>
        </div>
        <div class="content" id="resultBox">
          <section class="herosection" id="nodename">
            <p id="name"></p>
          </section>
          <section class="definition">
            <p id="definition"></p>
          </section>
          <section class="category">
            <p id="category"></p>
          </section>
          <section class="operations">
            <p id="operations"></p>
          </section>
          <section class="code">
            <p id="code"></p>
          </section>
          <section class="visual">
            <p id="visual"></p>
          </section>
          <section class="stepbystep">
            <p id="stepbystep"></p>
          </section>
          <section class="complexity">
            <p id="complexity"></p>
          </section>
          <section class="realexample">
            <p id="realexample"></p>
          </section>
          <section class="mathexample">
            <p id="mathexample"></p>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
